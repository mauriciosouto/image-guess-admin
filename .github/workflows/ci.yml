name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        env:
          # Build should not connect to DB; Prisma client still loads if imported.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          ADMIN_BASIC_AUTH_USER: ci
          ADMIN_BASIC_AUTH_PASSWORD: ci
        run: npm run build
